services:
  db:
    image: postgres:16-alpine
    container_name: chessgame-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess_dev_password
      POSTGRES_DB: chessgame
    ports:
      - "5432:5432"
    volumes:
      - chessgame_pgdata:/var/lib/postgresql/data
    healthcheck:
      # Depend on this rather than a sleep — the container accepts connections
      # a moment before Postgres is actually ready to serve them.
      test: ["CMD-SHELL", "pg_isready -U chess -d chessgame"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  chessgame_pgdata:
